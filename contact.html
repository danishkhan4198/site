<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get in touch — Danish Khan</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="contact.css">
</head>
<body>

    <div class="page">

        <nav class="nav">
            <a href="/" class="nav-logo">Danish Khan</a>
        </nav>

        <main class="main">
            <div class="contact-wrapper">

                <div class="contact-header">
                    <h1>Get in touch</h1>
                    <p>Whether it's a project, a question, or just a good conversation — I'm easy to reach.</p>
                </div>

                <form id="contact-form" action="https://api.web3forms.com/submit" method="POST" class="contact-form" novalidate>

                    <!-- Replace with your actual Web3Forms access key from web3forms.com -->
                    <input type="hidden" name="access_key" value="YOUR_ACCESS_KEY_HERE">
                    <input type="hidden" name="subject" value="New message from danish.click">
                    <input type="hidden" name="redirect" value="false">
                    <input type="checkbox" name="botcheck" style="display:none">

                    <div class="field">
                        <label for="name">Name</label>
                        <input
                            type="text"
                            id="name"
                            name="name"
                            placeholder="Your name"
                            required
                            autocomplete="name"
                        >
                    </div>

                    <div class="field">
                        <label for="email">Email</label>
                        <input
                            type="email"
                            id="email"
                            name="email"
                            placeholder="your@email.com"
                            required
                            autocomplete="email"
                        >
                    </div>

                    <div class="field">
                        <label for="message">Message</label>
                        <textarea
                            id="message"
                            name="message"
                            placeholder="What's on your mind?"
                            rows="5"
                            required
                        ></textarea>
                    </div>

                    <button type="submit" class="submit-btn" id="submit-btn">
                        <span class="btn-text">Send message</span>
                        <span class="btn-loading" aria-hidden="true">Sending…</span>
                    </button>

                </form>

                <div class="success-message" id="success-message" hidden>
                    <div class="success-icon">✓</div>
                    <h2>Message sent</h2>
                    <p>Thanks — I'll get back to you soon.</p>
                </div>

                <div class="error-message" id="error-message" hidden>
                    <p>Something went wrong. Try emailing me directly at <a href="mailto:dashingdanish4198@gmail.com">dashingdanish4198@gmail.com</a>.</p>
                </div>

            </div>
        </main>

    </div>

    <script>
        const form = document.getElementById('contact-form');
        const submitBtn = document.getElementById('submit-btn');
        const successMsg = document.getElementById('success-message');
        const errorMsg = document.getElementById('error-message');

        form.addEventListener('submit', async function(e) {
            e.preventDefault();

            submitBtn.classList.add('loading');
            submitBtn.disabled = true;
            errorMsg.hidden = true;

            const formData = new FormData(form);
            const data = Object.fromEntries(formData);

            try {
                const response = await fetch('https://api.web3forms.com/submit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                if (result.success) {
                    form.hidden = true;
                    successMsg.hidden = false;
                } else {
                    throw new Error('Submission failed');
                }
            } catch (err) {
                errorMsg.hidden = false;
                submitBtn.classList.remove('loading');
                submitBtn.disabled = false;
            }
        });
    </script>

</body>
</html>
